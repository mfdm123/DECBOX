<!DOCTYPE html> <html lang="en">
<head>
	<title>Decbox</title>
    <link rel="icon" href="svgs/icons/logo.svg">
	<link rel="stylesheet" href="index.css">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>
    <div class="root">

        <div class="header">
            <a class="logo" href="index.html">
                <img src="svgs/icons/logo.svg">
                <h1>DECBOX</h1>
            </a>
        </div>

        <div class="middle">
            <div class="upload df-border auto-font">
                <fieldset class="console-row" id="console-row">
                    <div class="convert-settings">
                        <label>Convert format to
                            <select class="target-format" id="target-format">
                                <option value=>original</option>
                                <option value="image/png">PNG</option>
                                <option value="image/jpeg">JPEG</option>
                                <option value="image/webp">WebP</option>
                            </select>
                        </label>
                    </div>
                    <div class="compress-settings">
                        <label>quality(0~100%)
                            <input class="compress-quality-number" type="number" name="range" min="0" max="100" value="70" id="compress-quality-number">
                            <input class="compress-quality-range" type="range" name="range" min="0" max="100" step="1" value="70" list="tickmarks" id="compress-quality-range">
                            <datalist id="tickmarks">
                                <option value="0"></option>
                                <option value="25"></option>
                                <option value="50"></option>
                                <option value="75"></option>
                                <option value="100"></option>
                            </datalist>
                        </label>
                        <label>maxsize(MB)
                            <input class="compress-max-size-number" type="number" name="max-size" min="0" max="10" value="1" id="compress-max-size-number">
                        </label>
                    </div>
                    <div class="file-name-settings">
                        <input class="prefix" type="text" placeholder="prefix">
                        <label>[file_name]</label>
                        <input class="suffix" type="text" placeholder="suffix">
                        <label>[file_extension]</label>
                    </div>
                    <div class="redo-or-undo">
                        <input type= "button" class="undo-button" value="undo" disabled>
                        <input type= "button" class="redo-button" value="redo" disabled>
                    </div>
                </fieldset>
                <div class="files-row">
                    <div class="input-area df-border">
                        <label for="input-file">
                            Please select a file/ files or drag the file(s) here
                        </label>
                        <input type="file" id="input-file" multiple>
                    </div>
                    <div class="display-area">
                        <!--
                        <field class='file-item'>
                            <div class="left">
                                <img src="svgs/icons/file.svg">
                                <span class="file-name">file.name</span>
                                <span class="file-size">file.size</span>
                            </div>
                            <div class="right">
                                <span class='status'>status</span>
                                <input type='button' value='download'>
                                <input type='button' value='del'>
                            </div>
                        </field>
                        -->
                    </div>
                </div>
                <div class="confirm-row" id="confirm-row">
                    <div id="prompt" class="prompt">
                        <p id="format-not-different">The source and target should be in different formats.</p>
                    </div>
                    <div class="buttons">
                        <input class="delete-button" type="button" value="delete" id="delete-button">
                        <input class="process-button" type="button" value="process" id="process-button">
                        <input class="download-button" type="button" value="download" id="download-button">
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="icons"></div>
        </div>
    </div>
<script type="module" src="index.js"></script>
</body>
</html>
